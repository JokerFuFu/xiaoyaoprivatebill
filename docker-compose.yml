# Docker Compose 配置
# 用于一键启动小遥账单助手

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiaoyao-backend
    restart: unless-stopped
    environment:
      - APP_NAME=小遥账单助手
      - APP_ENV=production
      - DEBUG=False
      # 多用户:bootstrap 管理员(仅首次启动生效),可在同目录 .env 覆盖
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin12345}
      - ADMIN_DISPLAY=${ADMIN_DISPLAY:-管理员}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      # AI(Anthropic 兼容端点,默认 Kimi);API Key 放在同目录 .env(不入库)
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.kimi.com/coding/}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-kimi-k2-0905-preview}
    volumes:
      - backend-data:/app/data
    networks:
      - xiaoyao-network
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 5000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xiaoyao-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - xiaoyao-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend-data:
    driver: local

networks:
  xiaoyao-network:
    driver: bridge
